<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waymarked - UK Walk &amp; Hike Planner</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <header>
        <!-- Minimal winding-path trail icon -->
        <svg class="header-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 20 C6 20 6 14 9 14 C12 14 12 18 15 16 C18 14 18 8 21 6"
                  stroke="rgba(255,255,255,0.80)" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="3"  cy="20" r="1.6" fill="rgba(255,255,255,0.70)"/>
            <circle cx="21" cy="6"  r="1.6" fill="rgba(200,89,10,0.90)"/>
        </svg>
        <div class="header-title">
            <h1>Waymarked</h1>
            <span class="header-tagline">UK Walk &amp; Hike Planner</span>
        </div>
    </header>

    <div class="container">
        <div class="sidebar">
            <form id="routeForm">

                <!-- Start Point — place search replaces number inputs -->
                <div class="form-group">
                    <label for="startSearch">Start Point</label>
                    <div class="search-wrapper">
                        <input type="text" id="startSearch" class="search-input"
                               placeholder="Search place, postcode or address…"
                               autocomplete="off" spellcheck="false">
                        <div class="search-dropdown" id="startDropdown"></div>
                    </div>
                    <!-- Hidden coords read by the submit handler (unchanged contract) -->
                    <input type="hidden" id="startLat">
                    <input type="hidden" id="startLon">
                    <div class="helper-text">e.g. "Keswick", "LA22 9QU", "Scafell Pike"</div>
                </div>

                <!-- End Point — place search replaces number inputs -->
                <div class="form-group">
                    <label for="endSearch">End Point <span style="font-weight:400;text-transform:none;">(optional)</span></label>
                    <div class="search-wrapper">
                        <input type="text" id="endSearch" class="search-input"
                               placeholder="Search place, postcode or address…"
                               autocomplete="off" spellcheck="false">
                        <div class="search-dropdown" id="endDropdown"></div>
                    </div>
                    <!-- Hidden coords read by the submit handler (unchanged contract) -->
                    <input type="hidden" id="endLat">
                    <input type="hidden" id="endLon">
                    <div class="helper-text">Leave blank for round trip</div>
                </div>

                <hr class="divider">

                <!-- Map-click mode toggle -->
                <div class="map-mode-group">
                    <span class="map-mode-label">Click map to place point</span>
                    <div class="map-mode-toggle">
                        <button type="button" class="mode-btn" id="modeStartBtn">📍 Set Start</button>
                        <button type="button" class="mode-btn" id="modeEndBtn">📍 Set End</button>
                        <button type="button" class="mode-btn active-off" id="modeOffBtn">✕ Off</button>
                    </div>
                </div>

                <hr class="divider">

                <div class="form-group">
                    <label for="distance">Distance (round trip only)</label>
                    <div class="distance-inputs">
                        <input type="number" id="distance" step="0.1" min="0.1" placeholder="Distance" value="10">
                        <select id="distanceUnit">
                            <option value="kilometres">km</option>
                            <option value="miles">mi</option>
                        </select>
                    </div>
                    <div class="helper-text">Required when no end point is set</div>
                </div>

                <div class="form-group">
                    <label for="profile">Route Profile</label>
                    <select id="profile" required>
                        <option value="foot">Walking</option>
                        <option value="hike">Hiking</option>
                    </select>
                </div>

                <button type="submit" id="planButton">Plan Route</button>
            </form>

            <div id="error" class="error"></div>

            <div id="stats" class="stats">
                <h3>Route Summary</h3>
                <div class="stat-row">
                    <span class="stat-label"><span aria-hidden="true">📏</span> Distance</span>
                    <span class="stat-value" id="statDistance">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label"><span aria-hidden="true">⏱</span> Estimated Time</span>
                    <span class="stat-value" id="statTime">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label"><span aria-hidden="true">🗺</span> Instructions</span>
                    <span class="stat-value" id="statInstructions">-</span>
                </div>
                <button class="steps-toggle" id="stepsToggle" type="button" style="display:none">▾ Show steps</button>
                <ol class="steps-list" id="stepsList"></ol>
                <div class="export-section" id="exportSection" style="display:none">
                    <p class="export-label">Export route</p>
                    <div class="export-buttons">
                        <button type="button" class="export-btn" id="exportGpx">GPX</button>
                        <button type="button" class="export-btn" id="exportKml">KML</button>
                        <button type="button" class="export-btn" id="exportGeoJson">GeoJSON</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    <script src="js/geocoder.js"></script>
    <script src="js/markers.js"></script>
    <script src="js/arrows.js"></script>
    <script src="js/route.js"></script>
</body>
</html>
