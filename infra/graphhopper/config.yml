# GraphHopper configuration for Waymarked UK hiking/walking routes
# See: https://github.com/graphhopper/graphhopper/blob/master/config-example.yml

graphhopper:
  datareader.file: /data/map.osm.pbf
  graph.location: /data/graph-cache

  # Routing profiles using GH 11.x custom model format
  profiles:
    - name: foot
      custom_model_files: [foot.json, foot_elevation.json]
    - name: hike
      custom_model_files: [hike.json, foot_elevation.json]

  profiles_ch:
    - profile: foot
    - profile: hike

  profiles_lm: []

  # Elevation: SRTM auto-downloads from NASA
  graph.elevation.provider: srtm
  graph.elevation.cache_dir: /data/elevation-cache

  # Encoded values required by foot/hike profiles
  graph.encoded_values: road_class, road_environment, road_access, surface, foot_network, hike_rating, foot_access, foot_priority, country, foot_road_access, mtb_rating, foot_average_speed, average_slope

  prepare.min_network_size: 200
  routing.non_ch.max_waypoint_distance: 1000000

  # Don't exclude footways/paths— they are essential for walking/hiking routing
  import.osm.ignored_highways: motorway,trunk

# Dropwizard server config (GH 11.x moved web settings here)
server:
  application_connectors:
  - type: http
    port: 8989
    bind_host: 0.0.0.0
  admin_connectors:
  - type: http
    port: 8990
    bind_host: 0.0.0.0
