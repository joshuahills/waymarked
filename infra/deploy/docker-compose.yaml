services:
  db:
    image: "postgres:17-alpine"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "waymarked"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - waymarked-postgres-data:/var/lib/postgresql/data
    networks:
      - "aspire"
    restart: "always"
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  graphhopper:
    image: "${GRAPHHOPPER_IMAGE}"
    environment:
      JAVA_OPTS: "-Xmx6g -Xms512m"
    expose:
      - "8989"
    volumes:
      - type: "bind"
        target: "/data/config.yml"
        source: "${GRAPHHOPPER_BINDMOUNT_0}"
        read_only: true
      - type: "bind"
        target: "/data"
        source: "${GRAPHHOPPER_BINDMOUNT_1}"
        read_only: false
    networks:
      - "aspire"
  waymarked-api:
    image: "${WAYMARKED_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WAYMARKED_API_PORT}"
      GRAPHHOPPER_HTTP: "http://graphhopper:8989"
      services__graphhopper__http__0: "http://graphhopper:8989"
      ConnectionStrings__waymarked: "Host=db;Database=waymarked;Username=postgres;Password=${POSTGRES_PASSWORD}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "waymarked-api"
    expose:
      - "${WAYMARKED_API_PORT}"
    depends_on:
      graphhopper:
        condition: "service_started"
      db:
        condition: "service_started"
    networks:
      - "aspire"
  waymarked-web:
    image: "${WAYMARKED_WEB_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${WAYMARKED_WEB_PORT}"
      WAYMARKED_API_HTTP: "http://waymarked-api:${WAYMARKED_API_PORT}"
      services__waymarked-api__http__0: "http://waymarked-api:${WAYMARKED_API_PORT}"
      WAYMARKED_API_HTTPS: "https://waymarked-api:${WAYMARKED_API_PORT}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "waymarked-web"
    expose:
      - "${WAYMARKED_WEB_PORT}"
    depends_on:
      waymarked-api:
        condition: "service_started"
    networks:
      - "aspire"
  caddy:
    image: "caddy:2-alpine"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    expose:
      - "80"
      - "443"
    volumes:
      - type: "bind"
        target: "/etc/caddy/Caddyfile"
        source: "${CADDY_BINDMOUNT_0}"
        read_only: true
      - type: "bind"
        target: "/data"
        source: "${CADDY_BINDMOUNT_1}"
        read_only: false
      - type: "bind"
        target: "/config"
        source: "${CADDY_BINDMOUNT_2}"
        read_only: false
    depends_on:
      waymarked-web:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"

volumes:
  waymarked-postgres-data:
