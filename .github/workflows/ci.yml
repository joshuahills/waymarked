name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      - name: Test (unit + integration)
        run: |
          dotnet test src/Waymarked.sln \
            --no-build \
            --configuration Release \
            --filter "FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=test-results.xml" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/**/*.xml
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Swap in CI config before the cache step so the cache key reflects it.
      - name: Use CI GraphHopper config (elevation disabled)
        run: cp infra/graphhopper/config-ci.yml infra/graphhopper/config.yml

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      - name: Cache GraphHopper IoW graph
        id: gh-cache
        uses: actions/cache@v4
        with:
          path: infra/graphhopper/data
          key: gh-graph-${{ hashFiles('infra/graphhopper/Dockerfile', 'infra/graphhopper/config.yml') }}-iow-v2

      - name: Download Isle of Wight OSM
        if: steps.gh-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p infra/graphhopper/data
          wget -q -O infra/graphhopper/data/map.osm.pbf \
            https://download.geofabrik.de/europe/united-kingdom/england/isle-of-wight-latest.osm.pbf

      - name: Build GraphHopper image
        run: docker build -t graphhopper-ci infra/graphhopper/

      - name: Build GraphHopper routing graph
        if: steps.gh-cache.outputs.cache-hit != 'true'
        run: |
          docker run -d --name gh-build \
            -v "${{ github.workspace }}/infra/graphhopper/data:/data" \
            -v "${{ github.workspace }}/infra/graphhopper/config.yml:/data/config.yml:ro" \
            -p 8989:8989 \
            graphhopper-ci
          if ! timeout 600 bash -c '
            until curl -sf --max-time 5 \
              "http://localhost:8989/route?profile=foot&point=50.7017,-1.2986&point=50.72,-1.16" \
              > /dev/null 2>&1; do
              sleep 5
            done'; then
            echo "::error::GraphHopper did not become ready within 600s"
            docker logs gh-build 2>&1 || true
            docker rm -f gh-build 2>/dev/null || true
            exit 1
          fi
          docker stop gh-build
          docker rm gh-build

      - name: Install Playwright browsers
        run: pwsh src/Waymarked.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E tests
        env:
          GRAPHHOPPER_PREBUILT_IMAGE: graphhopper-ci
        run: |
          dotnet test src/Waymarked.E2E.Tests \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-results.xml" \
            --results-directory ./test-results/e2e

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ./test-results/e2e/**/*.xml
          retention-days: 14

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Build & push all images
        env:
          REGISTRY_ENDPOINT: ghcr.io
          REGISTRY_REPOSITORY: ${{ github.repository }}
        run: aspire do push

      - name: Generate Docker Compose artifacts
        env:
          REGISTRY_ENDPOINT: ghcr.io
          REGISTRY_REPOSITORY: ${{ github.repository }}
        run: aspire publish --output-path infra/deploy

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/deploy/docker-compose.yaml"
          target: /opt/waymarked
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/waymarked
            docker compose pull
            docker compose up -d --remove-orphans
