name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build + unit/integration tests
  # Skips E2E tests — those require Docker + GraphHopper container (see job 2)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Cache NuGet packages — keyed on Directory.Packages.props + all .csproj files
      # so the cache is invalidated when any package version or project changes.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      # Runs unit tests (Waymarked.Routing.Tests) and integration tests
      # (Waymarked.Api.Tests via WebApplicationFactory).
      # E2E tests are explicitly excluded — they start real containers and need
      # a Docker-capable runner (see the e2e-tests job below).
      - name: Test (unit + integration)
        run: |
          dotnet test src/Waymarked.sln \
            --no-build \
            --configuration Release \
            --filter "FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=test-results.xml" \
            --results-directory ./test-results

      # Always upload test results so failures are visible in the GitHub UI
      # even when the test step itself fails.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/**/*.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: E2E tests — DISABLED / placeholder
  #
  # These tests use Aspire.Hosting.Testing which boots real containers:
  #   - GraphHopper (pulls from GHCR/Docker Hub, loads OSM routing graph)
  #   - Waymarked.Api (via AppHost)
  #
  # To enable, you need one of:
  #   a) A self-hosted runner with Docker and the pre-pulled GraphHopper image
  #      and OSM data already mounted at infra/graphhopper/data/.
  #   b) Docker-in-Docker on a GitHub-hosted runner, with OSM data fetched as
  #      a build artifact or baked into a custom runner image.
  #   c) A dedicated test environment with docker compose + volume mounts.
  #
  # Un-comment the steps below and remove the `if: false` guard when ready.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (disabled — requires containers)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: false # ← Remove this line to enable once a suitable runner is configured

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      # TODO: Pull GraphHopper image and seed OSM data before running E2E tests.
      # The Aspire test host will attempt to start the container automatically,
      # but the OSM routing graph must already be built and accessible at the
      # bind-mounted path (infra/graphhopper/data/).
      - name: Install Playwright browsers
        run: pwsh src/Waymarked.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run E2E tests
        run: |
          dotnet test src/Waymarked.E2E.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=e2e-results.xml" \
            --results-directory ./test-results/e2e

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ./test-results/e2e/**/*.xml
          retention-days: 14
