name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build + unit/integration tests
  # Skips E2E tests — those require Docker + GraphHopper container (see job 2)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Cache NuGet packages — keyed on Directory.Packages.props + all .csproj files
      # so the cache is invalidated when any package version or project changes.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      # Runs unit tests (Waymarked.Routing.Tests) and integration tests
      # (Waymarked.Api.Tests via WebApplicationFactory).
      # E2E tests are explicitly excluded — they start real containers and need
      # a Docker-capable runner (see the e2e-tests job below).
      - name: Test (unit + integration)
        run: |
          dotnet test src/Waymarked.sln \
            --no-build \
            --configuration Release \
            --filter "FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=test-results.xml" \
            --results-directory ./test-results

      # Always upload test results so failures are visible in the GitHub UI
      # even when the test step itself fails.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/**/*.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: E2E tests — Playwright + Aspire.Hosting.Testing against Isle of Wight OSM
  #
  # Strategy:
  #   - Use the Isle of Wight Geofabrik extract (~5 MB) instead of full GB data.
  #   - Cache the pre-built GraphHopper routing graph keyed on the Dockerfile +
  #     config.yml hashes so it rebuilds only when GraphHopper or config changes.
  #   - Cache hit  → graph is ready instantly; GH starts in ~5 s.
  #   - Cache miss → download IoW OSM, run GraphHopper once to build the graph
  #                  (~30–60 s for IoW), save to cache.
  #   - Aspire.Hosting.Testing boots GraphHopper from the same image using the
  #     cached graph at infra/graphhopper/data/ (the AppHost bind-mount path).
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Build
        run: dotnet build src/Waymarked.sln --no-restore --configuration Release

      # Cache the pre-built GraphHopper graph for the Isle of Wight extract.
      # Key includes both the Dockerfile and config.yml so that any change to
      # the GH version or routing profiles invalidates the cached graph.
      - name: Cache GraphHopper IoW graph
        id: gh-cache
        uses: actions/cache@v4
        with:
          path: infra/graphhopper/data
          key: gh-graph-${{ hashFiles('infra/graphhopper/Dockerfile', 'infra/graphhopper/config.yml') }}-iow-v1

      # Only runs on cache miss. Downloads the ~5 MB Isle of Wight PBF file.
      - name: Download Isle of Wight OSM
        if: steps.gh-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p infra/graphhopper/data
          wget -q -O infra/graphhopper/data/map.osm.pbf \
            https://download.geofabrik.de/europe/great-britain/england/isle-of-wight-latest.osm.pbf

      # Only runs on cache miss. Builds GraphHopper from the local Dockerfile,
      # then runs it once to produce the routing graph in infra/graphhopper/data/.
      # The container is stopped once the /health endpoint responds — at that point
      # the graph-cache/ and elevation-cache/ directories are fully populated.
      - name: Build GraphHopper routing graph
        if: steps.gh-cache.outputs.cache-hit != 'true'
        run: |
          docker build -t graphhopper-ci infra/graphhopper/
          docker run --rm -d --name gh-build \
            -v "${{ github.workspace }}/infra/graphhopper/data:/data" \
            -v "${{ github.workspace }}/infra/graphhopper/config.yml:/data/config.yml:ro" \
            -p 8989:8989 \
            graphhopper-ci
          echo "Waiting for GraphHopper to build the IoW graph and become ready..."
          timeout 180 bash -c 'until curl -sf http://localhost:8989/health 2>/dev/null; do sleep 3; done'
          echo "GraphHopper is ready — stopping build container (graph is cached on disk)"
          docker stop gh-build

      - name: Install Playwright browsers
        run: pwsh src/Waymarked.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

      # Aspire.Hosting.Testing starts GraphHopper via the AppHost, which bind-mounts
      # infra/graphhopper/data/ (pre-populated above). GH detects the existing graph
      # and skips rebuilding, so startup takes ~5 seconds instead of 30+.
      - name: Run E2E tests
        run: |
          dotnet test src/Waymarked.E2E.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=e2e-results.xml" \
            --results-directory ./test-results/e2e

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ./test-results/e2e/**/*.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build container images, push to GHCR, deploy to Hetzner server
  #
  # Runs on every push to master (not PRs).
  # Requires the following GitHub Actions secrets:
  #   DEPLOY_HOST    — IP or hostname of the Hetzner server
  #   DEPLOY_USER    — SSH user on the server (e.g. deploy)
  #   DEPLOY_SSH_KEY — private SSH key for that user
  #
  # The server must be bootstrapped with infra/deploy/setup.sh before first deploy.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Waymarked.sln

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      # aspire do push builds all container images (graphhopper Dockerfile + .NET SDK
      # container publishing for api/web) and pushes them to GHCR in one command.
      - name: Build & push all images
        env:
          REGISTRY_ENDPOINT: ghcr.io
          REGISTRY_REPOSITORY: ${{ github.repository }}
        run: aspire do push

      # Regenerate the compose file fresh from the AppHost model.
      - name: Generate Docker Compose artifacts
        env:
          REGISTRY_ENDPOINT: ghcr.io
          REGISTRY_REPOSITORY: ${{ github.repository }}
        run: aspire publish --output-path infra/deploy

      # Copy the freshly generated compose file and Caddyfile to the server.
      # The server's .env (created by setup.sh) is never overwritten by CI —
      # it contains server-specific bind mount paths and static :latest image tags.
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/deploy/docker-compose.yaml"
          target: /opt/waymarked
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/waymarked
            docker compose pull
            docker compose up -d --remove-orphans
